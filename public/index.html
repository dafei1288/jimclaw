<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JimClaw - Professional Command Center</title>
  
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#0f172a', // slate-900
            surface: '#1e293b',    // slate-800
            primary: '#6366f1',    // indigo-500
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0f172a; color: #f8fafc; margin: 0; overflow: hidden; height: 100vh; font-family: ui-sans-serif, system-ui, sans-serif; }
    .scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar::-webkit-scrollbar-track { background: transparent; }
    .scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    
    .toast { animation: slideIn 0.3s ease-out forwards; }
    .toast.hide { animation: slideOut 0.3s ease-in forwards; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

    /* Fix highlight.js background */
    pre code.hljs { background: transparent !important; padding: 0 !important; }
  </style>
</head>
<body class="flex flex-col h-screen">

  <!-- Toasts -->
  <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Header -->
  <header class="h-auto min-h-16 bg-surface border-b border-slate-700 flex flex-col sm:flex-row items-center justify-between px-4 py-2 sm:px-6 sm:py-0 shrink-0 shadow-md gap-2">
    <div class="flex items-center gap-2 sm:gap-4 w-full sm:w-auto shrink-0 justify-between sm:justify-start">
      <div class="flex items-center gap-2">
        <i data-lucide="cpu" class="w-5 h-5 sm:w-6 sm:h-6 text-primary"></i>
        <h1 class="text-base sm:text-xl font-bold tracking-wider uppercase">JimClaw</h1>
      </div>
      <span class="px-2 py-1 text-xs bg-slate-700 rounded-md text-slate-300" id="statusBadge">Idle</span>
    </div>

    <div class="flex-1 max-w-2xl w-full relative flex order-3 sm:order-2">
      <input type="text" id="goalInput" placeholder="输入协作目标..." class="w-full bg-slate-900 border border-slate-700 rounded-l-lg py-2 pl-3 pr-4 text-sm focus:outline-none focus:border-primary text-slate-200" />
      <button onclick="startTask()" id="runBtn" class="bg-primary hover:bg-indigo-400 text-white px-4 sm:px-6 py-2 rounded-r-lg text-sm font-semibold transition-colors shrink-0 whitespace-nowrap">执行</button>
    </div>

    <div class="flex items-center gap-2 sm:gap-4 text-xs sm:text-sm text-slate-400 w-full sm:w-auto justify-between sm:justify-end shrink-0 order-2 sm:order-3">
      <button onclick="openFeedbackBanner()" class="flex items-center gap-1 px-2 py-1 text-[10px] sm:text-xs border border-slate-600 rounded-md text-slate-400 hover:text-amber-400 hover:border-amber-500 transition-colors whitespace-nowrap" title="发送人工反馈">
        <i data-lucide="message-square" class="w-3 h-3"></i>
        <span class="hidden sm:inline">人工反馈</span>
      </button>
      <span class="px-2 py-1 text-[10px] sm:text-xs border border-slate-600 rounded-md text-slate-400 whitespace-nowrap" id="nodeBadge">Node: -</span>
      <span class="whitespace-nowrap">重试: <span id="retryCount" class="text-amber-400 font-mono">0 / 5</span></span>
    </div>
  </header>

  <!-- Approval Modal -->
  <div id="approvalModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-background/80 backdrop-blur-sm">
    <div class="bg-surface border border-primary/30 rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden animate-in fade-in zoom-in duration-300">
      <div class="p-6 md:p-8 flex flex-col items-center text-center">
        <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-6">
          <i data-lucide="shield-check" class="w-8 h-8 text-primary animate-pulse"></i>
        </div>
        <h2 class="text-xl md:text-2xl font-bold mb-3 tracking-tight">需要架构授权</h2>
        <p class="text-slate-400 text-sm md:text-base leading-relaxed mb-8">架构师已根据您的需求完成了技术方案设计与 API 契约定义。在启动自动化开发前，请审阅设计方案并授权执行。</p>
        
        <div class="grid grid-cols-2 gap-4 w-full">
          <button onclick="approve()" class="bg-primary hover:bg-indigo-400 text-white py-3 rounded-xl font-bold transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
            <i data-lucide="check-circle" class="w-5 h-5"></i> 授权执行
          </button>
          <button onclick="switchTab('dashboard'); document.getElementById('approvalModal').classList.add('hidden')" class="bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-bold transition-all border border-slate-700 flex items-center justify-center gap-2">
            <i data-lucide="eye" class="w-5 h-5"></i> 审阅方案
          </button>
        </div>
        <button onclick="openFeedbackBanner(); document.getElementById('approvalModal').classList.add('hidden')" class="mt-6 text-slate-500 hover:text-amber-400 text-xs transition-colors flex items-center gap-1">
          <i data-lucide="message-square" class="w-3 h-3"></i> 提出修改建议（拒绝并反馈）
        </button>
      </div>
    </div>
  </div>

  <!-- Human Feedback Banner -->
  <div id="feedbackBanner" class="hidden bg-amber-900/80 border-b border-amber-500 px-4 md:px-6 py-2 md:py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-2 md:gap-3 text-amber-100">
      <i data-lucide="message-circle-warning" class="w-4 h-4 md:w-5 md:h-5 text-amber-300"></i>
      <input type="text" id="feedbackInput" placeholder="输入您的质疑、建议或协助..." class="bg-amber-950/50 border border-amber-700 rounded px-3 py-1 text-sm text-amber-100 placeholder-amber-400/50 flex-1 max-w-md focus:outline-none focus:border-amber-500">
    </div>
    <div class="flex items-center gap-2">
      <button onclick="sendFeedback('challenge')" class="bg-rose-600 hover:bg-rose-500 text-white px-3 py-1.5 rounded text-xs font-semibold transition-colors">质疑</button>
      <button onclick="sendFeedback('assist')" class="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded text-xs font-semibold transition-colors">协助</button>
      <button onclick="closeFeedbackBanner()" class="text-amber-400 hover:text-amber-300 px-2 py-1 text-xs">关闭</button>
    </div>
  </div>

  <!-- Global Workflow Pipeline -->
  <div class="bg-surface border-b border-slate-700 px-4 md:px-8 py-3 shrink-0 shadow-sm">
    <div id="pipelineStages" class="flex items-center justify-between max-w-7xl mx-auto gap-1"></div>
  </div>

  <main class="flex-1 flex overflow-hidden flex-col lg:flex-row">
    <!-- Sidebar: Team -->
    <aside class="w-full lg:w-64 bg-surface border-r border-slate-700 flex flex-col shrink-0 max-h-48 lg:max-h-full overflow-hidden">
      <div class="p-3 lg:p-4 border-b border-slate-700 text-xs font-bold text-slate-300 uppercase tracking-widest flex items-center gap-2">
        <i data-lucide="users" class="w-4 h-4 text-slate-400"></i> 智能体矩阵
      </div>
      <div class="flex-1 overflow-y-auto scrollbar p-2 lg:p-4 space-y-2 lg:space-y-3" id="teamList"></div>
    </aside>

    <!-- Main Content -->
    <section class="flex-1 flex flex-col min-w-0 bg-background relative">
      <!-- Tabs -->
      <div class="flex bg-surface border-b border-slate-700 shrink-0 overflow-x-auto">
        <button onclick="switchTab('live')" id="tab-live" class="px-3 sm:px-6 py-2 sm:py-3 text-xs sm:text-sm font-medium border-b-2 border-primary text-white transition-colors whitespace-nowrap">实时终端</button>
        <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-3 sm:px-6 py-2 sm:py-3 text-xs sm:text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-colors whitespace-nowrap">决策与质量看板</button>
        <button onclick="switchTab('workspace')" id="tab-workspace" class="px-3 sm:px-6 py-2 sm:py-3 text-xs sm:text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-colors whitespace-nowrap">文件资产浏览器</button>
      </div>

      <!-- Tab Contents -->
      <div class="flex-1 relative overflow-hidden">
        
        <!-- Live Terminal -->
        <div id="view-live" class="absolute inset-0 flex flex-col p-2 md:p-4 bg-slate-900">
          <div id="logStream" class="flex-1 overflow-y-auto scrollbar space-y-2 md:space-y-4 pr-1 md:pr-2 font-mono text-xs md:text-sm">
            <div class="text-slate-500 italic flex items-center gap-2 justify-center h-full opacity-50">
              <i data-lucide="terminal" class="w-6 h-6 md:w-8 md:h-8"></i>
              <span class="text-xs md:text-sm">等待系统启动...</span>
            </div>
          </div>
        </div>

        <!-- Dashboard -->
        <div id="view-dashboard" class="hidden absolute inset-0 overflow-y-auto scrollbar p-3 md:p-6">
          <div class="max-w-7xl mx-auto space-y-4 md:space-y-6">

            <div class="rounded-2xl border border-slate-700 bg-gradient-to-br from-slate-900 via-slate-900 to-slate-800 p-4 md:p-6 shadow-xl">
              <div class="space-y-4">
                <div class="flex items-center gap-2 text-[11px] uppercase tracking-[0.28em] text-cyan-400 font-bold">
                  <i data-lucide="radar" class="w-4 h-4"></i> 指挥台
                </div>
                <div id="monitorContent" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3 md:gap-4">
                  <div class="bg-slate-900/40 border border-slate-700 rounded-lg p-3 text-xs text-slate-400 italic">等待运行数据...</div>
                </div>
              </div>
            </div>

            <!-- Deployment -->
            <div id="deployBlock" class="hidden bg-emerald-900/20 border border-emerald-500/30 rounded-xl p-3 md:p-6 shadow-sm">
              <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
                <div>
                  <h3 class="text-emerald-400 font-bold mb-1 md:mb-2 flex items-center gap-2 text-sm md:text-base"><i data-lucide="rocket" class="w-4 h-4 md:w-5 md:h-5"></i> 服务已部署</h3>
                  <p class="text-slate-300 text-xs md:text-sm font-mono break-all" id="deployInfo"></p>
                </div>
                <a id="deployUrl" target="_blank" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 md:px-6 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors whitespace-nowrap">打开预览</a>
              </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-4 md:gap-6">
              <div class="xl:col-span-2 bg-surface border border-slate-700 rounded-2xl p-4 md:p-5 shadow-sm flex flex-col">
                <div class="flex items-center justify-between gap-3 mb-3">
                  <h3 class="text-emerald-400 font-bold flex items-center gap-2 text-sm md:text-base"><i data-lucide="folder-kanban" class="w-4 h-4"></i> 文件产出</h3>
                  <span id="outputSummary" class="text-[11px] text-slate-500">等待任务拆解...</span>
                </div>
                <div id="tasksContent" class="space-y-2 text-xs md:text-sm flex-1 overflow-y-auto scrollbar max-h-[420px]">
                  <span class="text-slate-500 italic">暂无任务</span>
                </div>
              </div>

              <div class="bg-surface border border-slate-700 rounded-2xl p-4 md:p-5 shadow-sm flex flex-col">
                <h3 class="text-indigo-400 font-bold mb-3 flex items-center gap-2 text-sm md:text-base"><i data-lucide="book-open" class="w-4 h-4"></i> 项目共识</h3>
                <div id="briefContent" class="space-y-2 md:space-y-3 text-xs md:text-sm text-slate-300 flex-1 overflow-y-auto scrollbar max-h-[420px]">
                  <span class="text-slate-500 italic">暂无记录</span>
                </div>
              </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-4 md:gap-6">
              <div id="issueBlock" class="hidden xl:col-span-2 space-y-3 bg-rose-900/10 border border-rose-500/30 rounded-2xl p-4 md:p-5 shadow-sm">
                <h3 class="text-rose-400 font-bold flex items-center gap-2 text-sm md:text-base"><i data-lucide="bug" class="w-4 h-4"></i> 当前问题</h3>
                <div id="issueContent" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
              </div>

              <div id="qaBlock" class="hidden bg-rose-900/10 border border-rose-500/30 rounded-2xl p-4 md:p-5 shadow-sm">
                <h3 class="text-rose-400 font-bold mb-3 flex items-center gap-2 text-sm md:text-base"><i data-lucide="alert-circle" class="w-4 h-4"></i> 阻塞详情</h3>
                <div id="qaContent" class="space-y-2 md:space-y-3 max-h-[360px] overflow-y-auto scrollbar"></div>
              </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-2 gap-4 md:gap-6">
              <div id="fixPlanBlock" class="hidden bg-sky-900/10 border border-sky-500/30 rounded-2xl p-4 md:p-5 shadow-sm">
                <h3 class="text-sky-400 font-bold mb-3 flex items-center gap-2 text-sm md:text-base"><i data-lucide="handshake" class="w-4 h-4"></i> 修复方案</h3>
                <div id="fixPlanContent" class="space-y-2 md:space-y-3 max-h-[320px] overflow-y-auto scrollbar"></div>
              </div>

              <div id="medBlock" class="hidden bg-amber-900/10 border border-amber-500/30 rounded-2xl p-4 md:p-5 shadow-sm">
                <h3 class="text-amber-400 font-bold mb-3 flex items-center gap-2 text-sm md:text-base"><i data-lucide="git-merge" class="w-4 h-4"></i> 架构仲裁</h3>
                <div id="medContent" class="space-y-2 md:space-y-3 max-h-[320px] overflow-y-auto scrollbar"></div>
              </div>
            </div>

            <div id="protocolBlock" class="hidden bg-violet-900/10 border border-violet-500/30 rounded-2xl p-4 md:p-5 shadow-sm">
              <h3 class="text-violet-400 font-bold mb-3 flex items-center gap-2 text-sm md:text-base"><i data-lucide="shield-check" class="w-4 h-4"></i> 执行协议</h3>
              <div id="protocolContent" class="space-y-3 md:space-y-4"></div>
            </div>

          </div>
        </div>

        <!-- Workspace -->
        <div id="view-workspace" class="hidden absolute inset-0 flex flex-col md:flex-row">
          <div class="w-full md:w-72 h-48 md:h-auto border-r border-slate-700 bg-surface flex flex-col shrink-0">
            <div class="p-2 md:p-3 border-b border-slate-700 text-xs font-bold text-slate-400 flex justify-between items-center bg-slate-800/80">
              <span class="flex items-center gap-2"><i data-lucide="folder-tree" class="w-4 h-4"></i> 文件树</span>
              <button onclick="refreshFileTree()" class="hover:text-white transition-colors" title="刷新"><i data-lucide="refresh-cw" class="w-3 h-3"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto scrollbar p-2" id="fileTree"></div>
            <div class="border-t border-slate-700 bg-slate-900/40">
              <div class="p-2 md:p-3 text-xs font-bold text-slate-400 flex justify-between items-center">
                <span class="flex items-center gap-2"><i data-lucide="history" class="w-4 h-4"></i> Checkpoints</span>
                <button onclick="refreshCheckpoints()" class="hover:text-white transition-colors" title="刷新"><i data-lucide="refresh-cw" class="w-3 h-3"></i></button>
              </div>
              <div class="max-h-48 overflow-y-auto scrollbar p-2 pt-0" id="checkpointList"></div>
            </div>
          </div>
          <div class="flex-1 flex flex-col min-w-0 bg-[#0d1117]"> <!-- GitHub Dark Background -->
            <div id="fileHeader" class="h-10 border-b border-slate-700 flex items-center px-2 md:px-4 text-xs md:text-sm font-mono text-slate-400 bg-surface shadow-sm shrink-0 truncate">
              请在左侧选择文件
            </div>
            <div class="flex-1 overflow-auto scrollbar p-2 md:p-4 relative">
              <div id="filePlaceholder" class="absolute inset-0 flex items-center justify-center text-slate-600 opacity-50 flex-col gap-4">
                <i data-lucide="file-code-2" class="w-12 h-12 md:w-16 md:h-16"></i>
                <span class="tracking-widest uppercase text-[10px] md:text-xs font-bold">Workspace File Viewer</span>
              </div>
              <pre class="m-0"><code id="codeBlock" class="text-xs md:text-sm font-mono leading-relaxed"></code></pre>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <script>
    // Include full class names for Tailwind CSS JIT compilation scanning
    // 节点名称本地化映射
    const NODE_NAME_MAP = {
      'pm': '需求分析',
      'architect': '架构设计',
      'contract_sync': '契约同步',
      'approval': '人工审批',
      'orchestrator': '任务拆解',
      'coder': '代码开发',
      'infra_setup': '环境准备',
      'terminal': '测试执行',
      'verifier': '代码预检',
      'qa': '质量测试',
      'fix_plan': '修复协商',
      'architect_mediation': '架构干预',
      'deploy': '服务部署',
      'post_mortem': '复盘总结',
      'persistence': '结果归档'
    };

    // 格式化节点名称为用户友好的中文
    function formatNodeName(nodeName) {
      if (!nodeName) return '未知';
      // 精确匹配
      if (NODE_NAME_MAP[nodeName]) return NODE_NAME_MAP[nodeName];
      // 模糊匹配（处理组合节点名，如 orchestrator_coder）
      for (const [key, value] of Object.entries(NODE_NAME_MAP)) {
        if (nodeName.includes(key)) return value;
      }
      // 默认返回原名称
      return nodeName;
    }

    const AGENT_META_DEFAULTS = {
      '观止': { icon: 'user-cog', role: 'Project Manager', color: 'cyan' },
      '独孤': { icon: 'pen-tool', role: 'Chief Architect', color: 'yellow' },
      '星河': { icon: 'terminal', role: 'Senior Coder', color: 'green' },
      '清扬': { icon: 'search-check', role: 'QA Engineer', color: 'magenta' },
      'System': { icon: 'settings', role: 'Kernel', color: 'slate' }
    };

    let socket, session;
    let selectedAgentFilter = null;

    // 获取智能体的颜色类名映射
    function getAgentColorClasses(agentName) {
      const agent = session?.team?.find(a => a.name === agentName);
      const color = agent?.color || AGENT_META_DEFAULTS[agentName]?.color || 'slate';
      
      // 这里的键必须是 chalk 颜色名，值必须是 Tailwind 的基础颜色名
      const colorMap = {
        'cyan': 'cyan',
        'yellow': 'amber',
        'green': 'emerald',
        'magenta': 'rose',
        'blue': 'indigo',
        'gray': 'slate',
        'slate': 'slate'
      };
      
      const c = colorMap[color] || 'slate';
      
      // 注意：Tailwind 动态类名必须完整出现才能被扫描，或者使用 style 属性
      const configs = {
        cyan:    { text: 'text-cyan-400',    border: 'border-l-cyan-500',    icon: 'text-cyan-500',    bg: 'bg-cyan-500/10',    bgActive: 'bg-cyan-900/30',    bgPing: 'bg-cyan-500',    hex: '#22d3ee' },
        amber:   { text: 'text-amber-400',   border: 'border-l-amber-500',   icon: 'text-amber-500',   bg: 'bg-amber-500/10',   bgActive: 'bg-amber-900/30',   bgPing: 'bg-amber-500',   hex: '#fbbf24' },
        emerald: { text: 'text-emerald-400', border: 'border-l-emerald-500', icon: 'text-emerald-500', bg: 'bg-emerald-500/10', bgActive: 'bg-emerald-900/30', bgPing: 'bg-emerald-500', hex: '#34d399' },
        rose:    { text: 'text-rose-400',    border: 'border-l-rose-500',    icon: 'text-rose-500',    bg: 'bg-rose-500/10',    bgActive: 'bg-rose-900/30',    bgPing: 'bg-rose-500',    hex: '#fb7185' },
        indigo:  { text: 'text-indigo-400',  border: 'border-l-indigo-500',  icon: 'text-indigo-500',  bg: 'bg-indigo-500/10',  bgActive: 'bg-indigo-900/30',  bgPing: 'bg-indigo-500',  hex: '#818cf8' },
        slate:   { text: 'text-slate-400',   border: 'border-l-slate-500',   icon: 'text-slate-500',   bg: 'bg-slate-500/10',   bgActive: 'bg-slate-900/30',   bgPing: 'bg-slate-500',   hex: '#94a3b8' }
      };
      
      return configs[c] || configs.slate;
    }

    // 为日志内容中的智能体名字着色
    function colorizeAgentNames(content) {
      if (!content) return '';
      let result = escapeHtml(content);

      if (session?.team) {
        session.team.forEach(agent => {
          const classes = getAgentColorClasses(agent.name);
          const regex = new RegExp(`(${agent.name})`, 'g');
          result = result.replace(regex, `<span class="${classes.text} font-bold">$1</span>`);
        });
      }

      return result;
    }

    function showToast(msg, type='info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      let colors = 'bg-slate-800 border-slate-600 text-white';
      if (type === 'err') colors = 'bg-rose-900/90 border-rose-500 text-rose-100';
      if (type === 'ok') colors = 'bg-emerald-900/90 border-emerald-500 text-emerald-100';
      
      toast.className = `toast px-4 py-3 rounded-lg border shadow-lg text-sm flex items-center gap-2 ${colors} max-w-sm break-words`;
      toast.innerHTML = `<span>${escapeHtml(msg)}</span>`;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.classList.add('hide');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    function init() {
      if (typeof io === 'undefined') { showToast("Socket.io 加载失败", 'err'); return; }
      socket = io();
      setupSocket();
      lucide.createIcons();
      switchTab('live');
    }

    function setupSocket() {
      socket.on('connect', () => showToast("已连接到 JimClaw 服务器", 'ok'));
      socket.on('disconnect', () => showToast("已断开连接", 'err'));

      socket.on('session-sync', s => {
        session = s;
        updateUI();
        filterLogs();
      });
      socket.on('state-update', s => {
        session = s;
        updateUI();
        // 确保日志流在状态更新后重新渲染（处理刷新页面后的情况）
        if (session && session.events && document.getElementById('logStream').children.length === 0) {
          filterLogs();
        }
      });

      socket.on('agent-event', ev => {
        if (!session) session = { events: [] };
        if (!session.events) session.events = [];
        session.events.push(ev);
        if (!selectedAgentFilter || ev.sender === selectedAgentFilter) {
          appendLog(ev);
        }
      });
      
      socket.on('task-finished', () => { 
        showToast("任务执行完成", 'ok'); 
        document.getElementById('runBtn').disabled = false;
        document.getElementById('runBtn').innerText = '执行';
        refreshCheckpoints();
        switchTab('dashboard');
      });
      socket.on('task-error', (err) => {
        showToast("任务出错: " + (err.message || "未知错误"), 'err');
        document.getElementById('runBtn').disabled = false;
        document.getElementById('runBtn').innerText = '执行';
        refreshCheckpoints();
      });

      // Human-in-the-loop 事件处理
      socket.on('human-feedback-received', (feedback) => {
        showToast(`人工反馈已记录: ${feedback.content}`, 'ok');
        // 刷新看板以显示更新的共识
        updateUI();
      });
      socket.on('human-feedback-ack', (ack) => {
        if (ack.success) {
          showToast("反馈已发送", 'ok');
          closeFeedbackBanner();
        } else {
          showToast("反馈发送失败", 'err');
        }
      });
    }

    // Human-in-the-loop 函数
    function openFeedbackBanner() {
      document.getElementById('feedbackBanner').classList.remove('hidden');
      document.getElementById('feedbackInput').focus();
    }

    function closeFeedbackBanner() {
      document.getElementById('feedbackBanner').classList.add('hidden');
      document.getElementById('feedbackInput').value = '';
    }

    function sendFeedback(type) {
      const content = document.getElementById('feedbackInput').value.trim();
      if (!content) {
        showToast("请输入反馈内容", 'err');
        return;
      }

      socket.emit('human-feedback', {
        type,
        content,
        relatedNode: session?.currentNode
      });

      showToast("正在发送反馈...", 'info');
    }

    function updateUI() {
      if (!session) return;
      
      // Header status
      const statusBadge = document.getElementById('statusBadge');
      statusBadge.textContent = session.status || 'Idle';
      if (session.status === 'Running') {
        statusBadge.className = 'px-2 py-1 text-xs bg-indigo-500 text-white rounded-md ml-2 shadow-[0_0_8px_rgba(99,102,241,0.6)] animate-pulse border border-indigo-400';
      } else if (session.status === 'Error') {
        statusBadge.className = 'px-2 py-1 text-xs bg-rose-500 text-white rounded-md ml-2 border border-rose-400';
      } else {
        statusBadge.className = 'px-2 py-1 text-xs bg-slate-700 text-slate-300 rounded-md ml-2 border border-slate-600';
      }
      
      document.getElementById('nodeBadge').textContent = `Node: ${session.currentNode || '-'}`;
      document.getElementById('retryCount').textContent = `${session.retryCount || 0} / ${session.maxRetries || 5}`;

      // Approval Modal
      const modal = document.getElementById('approvalModal');
      if (session.requiresApproval && session.status === 'Running') {
        const pendingCheckpoint = Array.isArray(session.customerApprovalState?.checkpoints)
          ? session.customerApprovalState.checkpoints.find(item => !item.approved)
          : null;
        const title = modal.querySelector ? modal.querySelector('h2') : null;
        const body = modal.querySelector ? modal.querySelector('p') : null;
        if (title) title.textContent = `等待客户确认：${pendingCheckpoint?.stage || session.pendingApprovalStage || 'approval'}`;
        if (body) body.textContent = pendingCheckpoint?.summary || '方案设计已就绪，请审阅。';
        modal.classList.remove('hidden');
      } else {
        modal.classList.add('hidden');
      }

      renderTeam(session.team);
      renderPipeline();
      renderConsensus(session);
      renderMonitoring(session);
      renderTasks(session);
      renderIssues(session);
      renderQA(session.qaFailures);
      renderFixPlan(session.fixPlan);
      renderMediation(session.mediationDirectives);
      renderProtocol(session);
      renderDeploy(session);
      
      lucide.createIcons();
    }

    function renderTeam(team) {
      const container = document.getElementById('teamList');
      if (!team || !Array.isArray(team)) return;

      const NODE_AGENT_MAP = {
        'pm': '观止', 'orchestrator': '观止', 'post_mortem': '观止',
        'architect': '独孤', 'architect_mediation': '独孤',
        'coder': '星河', 'verifier': '星河', 'lint_fix': '星河', 'diagnose_code': '星河',
        'fix_plan': '清扬',  // QA 主导协商，Coder 配合
        'contract_sync': '清扬', 'infra_setup': '清扬', 'terminal': '清扬', 'qa': '清扬', 'deploy': '清扬',
      };

      const isCurrentNode = (nodeName, agentName) => {
        if (!nodeName) return false;
        const normalizedNode = nodeName.toLowerCase();
        for (const [node, owner] of Object.entries(NODE_AGENT_MAP)) {
          if (normalizedNode.includes(node) && owner === agentName) return true;
        }
        return false;
      };

      container.innerHTML = team.map(m => {
        const meta = AGENT_META_DEFAULTS[m.name] || AGENT_META_DEFAULTS['System'];
        const classes = getAgentColorClasses(m.name);
        const isActive = isCurrentNode(session.currentNode, m.name);
        const isFiltered = selectedAgentFilter === m.name;

        let bgClass = 'bg-slate-800/30';
        let inlineStyle = '';
        if (isActive) {
          bgClass = `${classes.bgActive}`;
          inlineStyle = `style="box-shadow: 0 0 15px ${classes.hex}44"`; // 44 是透明度
        }
        if (isFiltered) {
          bgClass = `${classes.bg} border-primary`;
        }

        // Models list
        const modelsHtml = Object.entries(m.models || {}).map(([mode, model]) => `
          <div class="flex items-center justify-between gap-1 md:gap-2 mt-1 px-1.5 md:px-2 py-0.5 bg-slate-900/50 rounded border border-slate-700/50">
            <span class="text-[8px] md:text-[9px] uppercase font-bold text-slate-500">${mode}</span>
            <span class="text-[9px] md:text-[10px] text-slate-300 font-mono truncate max-w-[60px] md:max-w-[100px]" title="${model}">${model.split('/').pop()}</span>
          </div>
        `).join('');

        return `
          <div onclick="toggleAgentFilter('${m.name}')" ${inlineStyle} class="p-2 md:p-3 rounded-lg border border-slate-700 border-l-4 ${classes.border} ${bgClass} transition-all shadow-sm cursor-pointer hover:bg-slate-800/50 relative overflow-hidden group">
            <div class="flex items-center gap-2 md:gap-3 mb-1.5 md:mb-2 relative z-10">
              <div class="shrink-0">
                <i data-lucide="${meta.icon}" class="w-4 h-4 md:w-5 md:h-5 ${classes.icon} ${isActive ? 'animate-pulse' : ''}"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-xs md:text-sm font-bold ${classes.text} truncate">${escapeHtml(m.name)}</div>
                <div class="text-[9px] md:text-[10px] text-slate-400 uppercase tracking-wider truncate">${escapeHtml(m.role || meta.role)}</div>
              </div>
              ${isActive ? `<div class="shrink-0 flex items-center gap-1">
                <span class="animate-pulse w-2 h-2 rounded-full ${classes.bgPing}"></span>
                <span class="text-[9px] md:text-[10px] font-bold ${classes.text}">工作中</span>
              </div>` : ''}
            </div>
            <div class="space-y-1 mt-1 md:mt-2 relative z-10">
              ${modelsHtml}
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleAgentFilter(name) {
      if (selectedAgentFilter === name) {
        selectedAgentFilter = null;
        showToast("已恢复全量日志", "info");
      } else {
        selectedAgentFilter = name;
        showToast(`已开启 ${name} 日志过滤`, "info");
      }
      updateUI();
      filterLogs();
    }

    function filterLogs() {
      const stream = document.getElementById('logStream');
      stream.innerHTML = '';
      if (!session || !session.events) {
        stream.innerHTML = '<div class="text-slate-500 italic flex items-center gap-2 justify-center h-full opacity-50"><i data-lucide="terminal" class="w-8 h-8"></i><span>等待系统启动...</span></div>';
        lucide.createIcons({ portal: stream });
        return;
      }

      session.events.forEach(ev => {
        if (!selectedAgentFilter || ev.sender === selectedAgentFilter) {
          appendLog(ev);
        }
      });
    }

    function appendLog(ev) {
      const stream = document.getElementById('logStream');
      const emptyState = stream.querySelector('.opacity-50');
      if (emptyState) emptyState.remove();

      const div = document.createElement('div');
      const meta = AGENT_META_DEFAULTS[ev.sender] || AGENT_META_DEFAULTS['System'];
      const classes = getAgentColorClasses(ev.sender);

      let detailHtml = '';
      if (ev.type === 'llm_call_start' && ev.metadata?.prompt) {
        detailHtml = `
          <details class="mt-2 group">
            <summary class="text-[9px] md:text-[10px] font-bold text-slate-500 cursor-pointer hover:text-slate-300 uppercase tracking-widest list-none flex items-center gap-1">
              <i data-lucide="chevron-right" class="w-3 h-3 group-open:rotate-90 transition-transform"></i> 查看 Prompt 详情
            </summary>
            <div class="mt-2 p-2 md:p-3 bg-slate-950 rounded-lg border border-slate-800 text-[10px] md:text-xs text-slate-400 font-mono whitespace-pre-wrap max-h-64 md:max-h-96 overflow-y-auto scrollbar">${escapeHtml(ev.metadata.prompt)}</div>
            ${ev.metadata.system ? `<div class="mt-1 text-[8px] md:text-[9px] text-slate-600 uppercase font-bold px-1">System Prompt included</div>` : ''}
          </details>
        `;
      } else if (ev.type === 'llm_call_end' && ev.metadata?.response) {
        detailHtml = `
          <details class="mt-2 group">
            <summary class="text-[9px] md:text-[10px] font-bold text-emerald-600/70 cursor-pointer hover:text-emerald-500 uppercase tracking-widest list-none flex items-center gap-1">
              <i data-lucide="chevron-right" class="w-3 h-3 group-open:rotate-90 transition-transform"></i> 查看 LLM 完整响应
            </summary>
            <div class="mt-2 p-2 md:p-3 bg-slate-950 rounded-lg border border-emerald-900/20 text-[10px] md:text-xs text-emerald-200/70 font-mono whitespace-pre-wrap max-h-64 md:max-h-96 overflow-y-auto scrollbar">${escapeHtml(ev.metadata.response)}</div>
          </details>
        `;
      } else if (ev.type === 'tool_use') {
        detailHtml = `
          <div class="mt-2 flex items-center gap-1 md:gap-2 text-[9px] md:text-[10px] font-bold text-amber-500/70 uppercase">
            <i data-lucide="wrench" class="w-3 h-3"></i> 执行动作: <span class="${classes.text}">${escapeHtml(ev.sender)}</span> 调用工具
          </div>
          <details class="mt-1 group">
            <summary class="text-[8px] md:text-[9px] font-bold text-slate-600 cursor-pointer hover:text-slate-400 uppercase tracking-widest list-none flex items-center gap-1">
              <i data-lucide="chevron-right" class="w-2 h-2 group-open:rotate-90 transition-transform"></i> 查看工具输出详情
            </summary>
            <div class="mt-2 p-2 md:p-3 bg-slate-950 rounded-lg border border-amber-900/20 text-[10px] md:text-xs text-amber-200/60 font-mono whitespace-pre-wrap max-h-48 md:max-h-64 overflow-y-auto scrollbar">${colorizeAgentNames(ev.content)}</div>
          </details>
        `;
      }

      div.className = 'flex gap-2 md:gap-4 mb-3 md:mb-5 text-xs md:text-sm animate-in slide-in-from-bottom-2 duration-300';
      
      // 构建气泡样式：全边框对应色 + 微弱背景 + 对应色文字
      const bubbleBorderClass = classes.border.replace('border-l-', 'border-');
      const bubbleBgClass = classes.bg;
      
      div.innerHTML = `
        <div class="mt-1 shrink-0 p-1.5 md:p-2 bg-slate-800 rounded-lg border border-slate-700 h-fit">
          <i data-lucide="${meta.icon}" class="w-4 h-4 md:w-5 md:h-5 ${classes.icon}"></i>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex flex-wrap items-center gap-1 md:gap-2 mb-1.5">
            <span class="font-bold ${classes.text} text-xs md:text-sm uppercase tracking-tight">${escapeHtml(ev.sender)}</span>
            <span class="text-[10px] text-slate-500 font-mono">${ev.timestamp || new Date().toLocaleTimeString()}</span>
            <span class="text-[8px] px-1.5 py-0.5 rounded ${bubbleBgClass} ${classes.text} border border-${classes.hex === '#94a3b8' ? 'slate' : ''}-500/20 font-bold uppercase tracking-widest">${ev.type.replace('_', ' ')}</span>
          </div>
          <!-- 消息内容气泡：文字颜色、边框、背景全部彩色化 -->
          <div class="${classes.text} opacity-90 whitespace-pre-wrap ${bubbleBgClass} rounded-2xl rounded-tl-none p-3 md:p-4 border ${bubbleBorderClass} border-opacity-30 shadow-sm leading-relaxed text-[11px] md:text-sm font-medium">
            ${colorizeAgentNames(ev.content)}
          </div>
          ${detailHtml}
        </div>

      stream.appendChild(div);
      stream.scrollTop = stream.scrollHeight;
      lucide.createIcons({ portal: div });
    }

    function summarizeCurrentFile(tasks = []) {
      if (!Array.isArray(tasks) || tasks.length === 0) return '未进入文件执行';
      const failedTask = tasks.find(task => task.status === 'failed');
      if (failedTask?.fileTarget) return failedTask.fileTarget;
      const activeTask = tasks.find(task => task.status !== 'completed');
      return activeTask?.fileTarget || tasks[tasks.length - 1]?.fileTarget || '未进入文件执行';
    }

    function getTopTokenAgent(byAgent = {}) {
      const entries = Object.entries(byAgent || {});
      if (entries.length === 0) return null;
      entries.sort((a, b) => (b[1]?.totalTokens || 0) - (a[1]?.totalTokens || 0));
      return entries[0];
    }

    function noteMatchesStage(noteId, stage) {
      if (!noteId || !stage) return false;
      const raw = String(noteId).toLowerCase();
      const aliases = {
        requirement: ['note-pm'],
        design: ['note-architect', 'note-mediation'],
        sync: ['note-contract_sync'],
        planning: ['note-orchestrator'],
        coding: ['note-coder'],
        fix_planning: ['note-fixplan'],
        verification: ['note-infra_setup', 'note-terminal', 'note-verifier', 'note-qa'],
        deployment: ['note-deploy'],
        review: ['note-post_mortem', 'note-persistence'],
      };
      return (aliases[stage.key] || []).some(prefix => raw.startsWith(prefix));
    }

    function getStageKeyFromNode(nodeName) {
      if (!nodeName) return null;
      const normalizedNode = String(nodeName).toLowerCase();
      const matched = PIPELINE_STAGES.find(stage =>
        (stage.nodes || []).some(node => normalizedNode.includes(node))
      );
      return matched?.key || null;
    }

    function getCompletedStageKeys(session) {
      const keys = new Set();
      const notes = Array.isArray(session?.meetingNotes) ? session.meetingNotes : [];
      notes.forEach(note => {
        PIPELINE_STAGES.forEach(stage => {
          if (noteMatchesStage(note.id, stage)) keys.add(stage.key);
        });
      });
      const activeIdx = PIPELINE_STAGES.findIndex(stage => stage.key === getStageKeyFromNode(session?.currentNode));
      if (activeIdx > 0) {
        PIPELINE_STAGES.slice(0, activeIdx).forEach(stage => keys.add(stage.key));
      }
      return keys;
    }

    function getStageState(stage, session) {
      const activeKey = getStageKeyFromNode(session?.currentNode);
      const completed = getCompletedStageKeys(session);
      const activeIdx = PIPELINE_STAGES.findIndex(item => item.key === activeKey);
      const currentIdx = PIPELINE_STAGES.findIndex(item => item.key === stage.key);
      const isFailed = Boolean(session?.lastFailedNode) && activeKey === stage.key && session?.status === 'Error';
      if (isFailed) return 'failed';
      if (activeKey === stage.key && session?.status === 'Running') return 'active';
      if (completed.has(stage.key)) return 'done';
      if (activeIdx > currentIdx && activeIdx !== -1) return 'done';
      if ((session?.status === 'Success' || session?.status === 'Completed') && currentIdx <= activeIdx) return 'done';
      return 'pending';
    }

    function getStageSummary(stage, session) {
      const notes = Array.isArray(session?.meetingNotes) ? session.meetingNotes : [];
      const matched = [...notes].reverse().find(note => noteMatchesStage(note.id, stage));
      if (matched?.summary) return matched.summary;
      if (getStageKeyFromNode(session?.currentNode) === stage.key) {
        return session?.lastFailureSummary || `当前节点：${formatNodeName(session?.currentNode || '')}`;
      }
      return '等待进入';
    }

    function renderConsensus(session) {

      if (!core && notes.length === 0) {
        container.innerHTML = '<span class="text-slate-500 italic flex h-full items-center justify-center">暂无记录</span>';

      }

          </div>
          <div class="p-2 border-l-2 border-indigo-500 bg-indigo-500/10 rounded-r text-xs space-y-1">

        }

          html += `<div class="mt-1"><span class="text-slate-400">需求：</span>
            <ul class="mt-0.5 space-y-0.5 pl-3">
              ${core.requirements.map((r, i) => `<li class="text-slate-300 list-disc list-inside">${i+1}. ${escapeHtml(r)}</li>`).join('')}

            </ul></div>`;
        }

        html += `<div class="mb-2">
          <div class="text-xs font-bold text-amber-400 uppercase tracking-wider mb-1 flex items-center gap-1">
            <i data-lucide="scroll-text" class="w-3 h-3"></i> 沟通纪要
          </div>
          <div class="space-y-1">`;
        notes.forEach(note => {
          html += `<div class="p-2 border-l-2 border-amber-500/40 bg-amber-500/5 rounded-r text-xs">
            <span class="text-amber-400 font-mono mr-1">[${escapeHtml(note.id)}]</span>
            <span class="text-slate-300">${escapeHtml(note.summary)}</span>
          </div>`;
        });
        html += `</div></div>`;
      }

      container.innerHTML = html || '<span class="text-slate-500 italic flex h-full items-center justify-center">暂无记录</span>';
      lucide.createIcons({ portal: container });
    }

    function renderTasks(session) {
      const container = document.getElementById('tasksContent');
      const summaryEl = document.getElementById('outputSummary');
      const tasks = Array.isArray(session?.subTasks) ? session.subTasks : [];
      const progress = session?.metrics?.progress || { total: 0, completed: 0, failed: 0, pending: 0, percent: 0 };
      if (!tasks || !Array.isArray(tasks) || tasks.length === 0) {
        summaryEl.textContent = '等待任务拆解...';
        container.innerHTML = '<span class="text-slate-500 italic flex h-full items-center justify-center">等待任务拆解...</span>';
        return;
      }

      summaryEl.textContent = `共 ${progress.total} 个文件任务，完成 ${progress.completed}，失败 ${progress.failed}，待处理 ${progress.pending}`;

      const groups = [
        { key: 'failed', title: '当前失败', empty: '暂无失败文件', items: tasks.filter(t => t.status === 'failed').slice(0, 4), iconColor: 'text-rose-400', icon: 'alert-triangle' },
        { key: 'active', title: '待执行 / 处理中', empty: '当前没有待执行文件', items: tasks.filter(t => t.status !== 'completed' && t.status !== 'failed').slice(0, 6), iconColor: 'text-amber-400', icon: 'clock-3' },
        { key: 'done', title: '最近完成', empty: '尚未有完成文件', items: [...tasks].filter(t => t.status === 'completed').slice(-6).reverse(), iconColor: 'text-emerald-400', icon: 'check-circle-2' },
      ];

      container.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
          <div class="rounded-xl border border-emerald-500/20 bg-emerald-950/20 p-3">
            <div class="text-[11px] uppercase tracking-[0.22em] text-slate-500 mb-2">已完成</div>
            <div class="text-3xl font-semibold text-emerald-300">${formatNumber(progress.completed)}</div>
          </div>
          <div class="rounded-xl border border-amber-500/20 bg-amber-950/20 p-3">
            <div class="text-[11px] uppercase tracking-[0.22em] text-slate-500 mb-2">待处理</div>
            <div class="text-3xl font-semibold text-amber-300">${formatNumber(progress.pending)}</div>
          </div>
          <div class="rounded-xl border border-rose-500/20 bg-rose-950/20 p-3">
            <div class="text-[11px] uppercase tracking-[0.22em] text-slate-500 mb-2">失败</div>
            <div class="text-3xl font-semibold text-rose-300">${formatNumber(progress.failed)}</div>
          </div>
        </div>
        <div class="space-y-4">
          ${groups.map(group => `
            <section class="rounded-xl border border-slate-700 bg-slate-900/40 p-3">
              <div class="flex items-center gap-2 mb-3 text-sm font-bold text-slate-200">
                <i data-lucide="${group.icon}" class="w-4 h-4 ${group.iconColor}"></i>
                ${group.title}

    function renderMonitoring(session) {
      const container = document.getElementById('monitorContent');
      const metrics = session.metrics || {};
      const tokenUsage = metrics.tokenUsage || { calls: 0, inputTokens: 0, outputTokens: 0, totalTokens: 0, byAgent: {} };
      const progress = metrics.progress || { total: 0, completed: 0, failed: 0, pending: 0, percent: 0 };
      const byAgent = tokenUsage.byAgent || {};
      const protocolFailures = Array.isArray(session.protocolFailures) ? session.protocolFailures : [];
      const primaryProtocolFailure = protocolFailures.find(item => item && item.blocking) || protocolFailures[0] || null;
      const currentStage = getStageLabelFromNode(session.currentNode || '-');
      const currentNode = formatNodeName(session.currentNode || '-');
      const activeFile = summarizeCurrentFile(session.subTasks);
      const blockedFile = primaryProtocolFailure?.file || session.qaFailures?.failedFiles?.[0] || session.issueTracker?.[0]?.relatedFiles?.[0] || '无';
      const blocker = primaryProtocolFailure?.summary || session.blockedReason || session.lastFailureSummary || session.qaFailures?.testErrors?.[0] || '当前没有阻塞说明';
      const topAgent = getTopTokenAgent(byAgent);
      const topAgentName = topAgent ? topAgent[0] : '暂无';
      const topAgentUsage = topAgent ? topAgent[1] : { totalTokens: 0, calls: 0 };

      container.innerHTML = `
        <div class="rounded-2xl border border-cyan-500/20 bg-cyan-950/20 p-4 md:p-5">
          <div class="flex items-center justify-between mb-3">
            <span class="text-sm font-bold text-cyan-300">当前阶段</span>
            <span class="text-xs font-mono text-cyan-200">${escapeHtml(session.status || 'Idle')}</span>
          </div>
          <div class="text-2xl md:text-3xl font-semibold text-white mb-1">${escapeHtml(currentStage)}</div>
          <div class="text-xs text-slate-400 mb-3">节点：<span class="text-slate-200 font-mono">${escapeHtml(currentNode)}</span></div>
          <div class="space-y-2 text-xs">
            <div class="flex items-center justify-between gap-3">
              <span class="text-slate-500">当前文件</span>
              <span class="text-slate-200 font-mono text-right break-all">${escapeHtml(activeFile)}</span>
            </div>
            <div class="flex items-center justify-between gap-3">
              <span class="text-slate-500">重试轮次</span>
              <span class="text-cyan-300 font-mono">${formatNumber(session.retryCount || 0)} / ${formatNumber(session.maxRetries || 0)}</span>
            </div>
          </div>
        </div>

        <div class="rounded-2xl border border-rose-500/20 bg-rose-950/20 p-4 md:p-5">
          <div class="flex items-center justify-between mb-3">
            <span class="text-sm font-bold text-rose-300">当前阻塞</span>
            <span class="text-xs font-mono text-rose-200">${escapeHtml(session.lastFailedNode ? formatNodeName(session.lastFailedNode) : '无')}</span>
          </div>
          <div class="rounded-xl border border-rose-500/20 bg-slate-950/40 p-3 mb-3 text-xs text-rose-100 leading-relaxed min-h-[104px]">
            ${escapeHtml(String(blocker).slice(0, 240))}
          </div>
          <div class="space-y-2 text-xs">
            <div class="flex items-center justify-between gap-3">
              <span class="text-slate-500">阻塞文件</span>
              <span class="text-slate-200 font-mono text-right break-all">${escapeHtml(blockedFile)}</span>
            </div>
            <div class="flex items-center justify-between gap-3">
              <span class="text-slate-500">失败节点</span>
              <span class="text-slate-200 text-right">${escapeHtml(session.lastFailedNode ? formatNodeName(session.lastFailedNode) : '无')}</span>
            </div>
          </div>
        </div>

        <div class="rounded-2xl border border-indigo-500/20 bg-indigo-950/20 p-4 md:p-5">
          <div class="flex items-center justify-between mb-3">
            <span class="text-sm font-bold text-indigo-300">执行进度</span>
            <span class="text-xs font-mono text-indigo-200">${formatNumber(progress.percent)}%</span>
          </div>
          <div class="grid grid-cols-3 gap-3 mb-4">
            <div class="rounded-xl border border-emerald-500/20 bg-emerald-950/20 p-3">
              <div class="text-[11px] uppercase tracking-[0.22em] text-slate-500 mb-1">完成</div>
              <div class="text-2xl font-semibold text-emerald-300">${formatNumber(progress.completed)}</div>
            </div>
            <div class="rounded-xl border border-amber-500/20 bg-amber-950/20 p-3">
              <div class="text-[11px] uppercase tracking-[0.22em] text-slate-500 mb-1">待处理</div>
              <div class="text-2xl font-semibold text-amber-300">${formatNumber(progress.pending)}</div>
            </div>
            <div class="rounded-xl border border-rose-500/20 bg-rose-950/20 p-3">
              <div class="text-[11px] uppercase tracking-[0.22em] text-slate-500 mb-1">失败</div>
              <div class="text-2xl font-semibold text-rose-300">${formatNumber(progress.failed)}</div>
            </div>
          </div>
          <div class="text-xs text-slate-400">总文件 <span class="font-mono text-slate-200">${formatNumber(progress.total)}</span></div>
        </div>

        <div class="rounded-2xl border border-emerald-500/20 bg-emerald-950/20 p-4 md:p-5">
          <div class="flex items-center justify-between mb-3">
            <span class="text-sm font-bold text-emerald-300">成本摘要</span>
            <span class="text-xs font-mono text-emerald-200">calls ${formatNumber(tokenUsage.calls)}</span>
          </div>
          <div class="grid grid-cols-3 gap-3 text-xs mb-4">
            <div><div class="text-slate-500">Input</div><div class="text-slate-200 font-mono">${formatNumber(tokenUsage.inputTokens)}</div></div>
            <div><div class="text-slate-500">Output</div><div class="text-slate-200 font-mono">${formatNumber(tokenUsage.outputTokens)}</div></div>
            <div><div class="text-slate-500">Total</div><div class="text-emerald-300 font-mono">${formatNumber(tokenUsage.totalTokens)}</div></div>
          </div>
          <div class="rounded-xl border border-emerald-500/20 bg-slate-950/40 p-3 text-xs">
            <div class="text-slate-500 mb-1">最高消耗 Agent</div>
            <div class="flex items-center justify-between gap-3">
              <span class="font-bold ${topAgent && getAgentColorClasses(topAgentName).text || 'text-slate-200'}">${escapeHtml(topAgentName)}</span>
              <span class="font-mono text-emerald-300">${formatNumber(topAgentUsage.totalTokens)} tokens</span>
            </div>
            <div class="mt-2 text-slate-400">调用 ${formatNumber(topAgentUsage.calls)} 次</div>
          </div>
        </div>
      `;
    }

    async function refreshFileTree() {
      const tree = document.getElementById('fileTree');
      try {
        const res = await fetch('/api/workspace/files');
        const { files } = await res.json();
        if (!files || files.length === 0) {
          tree.innerHTML = '<div class="text-slate-500 text-sm p-3 flex justify-center italic">工作区为空</div>';
          return;
        }
        
        // Ensure consistent sorting
        files.sort();
        
        tree.innerHTML = files.map(f => `
          <div onclick="openFile('${f}')" class="p-2 hover:bg-slate-800 rounded cursor-pointer flex items-center gap-3 text-slate-300 hover:text-white transition-colors group mb-1">
            <i data-lucide="file-code" class="w-4 h-4 text-slate-500 group-hover:text-primary shrink-0"></i>
            <span class="text-xs font-mono truncate" title="${escapeHtml(f)}">${escapeHtml(f)}</span>
          </div>
        `).join('');
        lucide.createIcons({ portal: tree });
      } catch (e) { 
        tree.innerHTML = '<div class="text-rose-400 text-sm p-3 text-center">获取文件失败</div>';
      }
    }

    async function refreshCheckpoints() {
      const list = document.getElementById('checkpointList');
      try {
        const res = await fetch('/api/workspace/checkpoints');
        const data = await res.json();
        const checkpoints = data.checkpoints || [];
        if (checkpoints.length === 0) {
          list.innerHTML = '<div class="text-slate-500 text-xs p-2 italic">暂无 checkpoint</div>';
          return;
        }

        list.innerHTML = checkpoints
          .slice()
          .sort((a, b) => String(b.timestamp).localeCompare(String(a.timestamp)))
          .map(cp => `
            <div class="mb-2 rounded border border-slate-700 bg-slate-800/60 p-2">
              <div class="flex items-center justify-between gap-2">
                <div class="min-w-0">
                  <div class="text-[11px] font-mono text-indigo-300 truncate">${escapeHtml(cp.id)}</div>
                  <div class="text-[10px] text-slate-400">${escapeHtml(formatNodeName(cp.node))} · R${cp.round}</div>
                  <div class="text-[10px] text-slate-500 truncate">${escapeHtml(cp.timestamp || '')}</div>
                </div>
                <button onclick="replayCheckpoint('${cp.id}')" class="shrink-0 rounded bg-indigo-600 px-2 py-1 text-[10px] font-semibold text-white hover:bg-indigo-500 transition-colors">继续</button>
              </div>
            </div>
          `).join('');
        lucide.createIcons({ portal: list });
      } catch (e) {
        list.innerHTML = '<div class="text-rose-400 text-xs p-2">获取 checkpoint 失败</div>';
      }
    }

    function replayCheckpoint(checkpointId) {
      if (!socket) {
        showToast('Socket 未连接', 'err');
        return;
      }
      document.getElementById('runBtn').disabled = true;
      document.getElementById('runBtn').innerText = '续跑中...';
      document.getElementById('logStream').innerHTML = '';
      switchTab('live');
      if (session) session.events = [];
      socket.emit('replay-task', { checkpointId });
      showToast(`已从 ${checkpointId} 启动续跑`, 'info');
    }

    async function openFile(path) {
      document.getElementById('fileHeader').textContent = path;
      const codeBlock = document.getElementById('codeBlock');
      const placeholder = document.getElementById('filePlaceholder');
      if (placeholder) placeholder.style.display = 'none';
      
      codeBlock.innerHTML = '<span class="text-slate-500 animate-pulse block text-center mt-10">加载中...</span>';
      
      try {
        const res = await fetch('/api/workspace/file?path=' + encodeURIComponent(path));
        const data = await res.json();
        
        if (data.error) {
          codeBlock.innerHTML = `<span class="text-rose-400 block p-4">错误: ${escapeHtml(data.error)}</span>`;
          return;
        }

        const ext = path.split('.').pop()?.toLowerCase();
        const langMap = { ts: 'typescript', js: 'javascript', py: 'python', json: 'json', md: 'markdown', html: 'html', css: 'css', sh: 'bash', yml: 'yaml', yaml: 'yaml' };
        const lang = langMap[ext] || 'plaintext';
        
        if (window.hljs) {
          codeBlock.className = `text-sm font-mono leading-relaxed hljs language-${lang}`;
          codeBlock.innerHTML = hljs.highlight(data.content || '', { language: lang, ignoreIllegals: true }).value;
        } else {
          codeBlock.textContent = data.content;
          codeBlock.className = 'text-sm font-mono leading-relaxed text-slate-300';
        }
      } catch (e) {
        codeBlock.innerHTML = '<span class="text-rose-400 block p-4">读取文件异常</span>';
      }
    }

    function startTask() {
      const goal = document.getElementById('goalInput').value.trim();
      if (!goal) {
        showToast("请输入协作目标", "err");
        return;
      }
      document.getElementById('runBtn').disabled = true;
      document.getElementById('runBtn').innerText = '启动中...';
      document.getElementById('logStream').innerHTML = '';
      switchTab('live');
      
      if (session) session.events = [];
      socket.emit('run-task', { userGoal: goal });
      showToast("任务已提交至智能矩阵", "info");
    }

    function approve() { 
      socket.emit('approve-task', { approved: true }); 
      document.getElementById('approvalModal').classList.add('hidden'); 
      showToast("已批准架构方案，继续执行", "ok"); 
      switchTab('live');
    }

    function escapeHtml(s) { 
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); 
    }

    window.onload = init;
  </script>
</body>
</html>
